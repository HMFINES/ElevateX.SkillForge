version: 1
applications:
  - appRoot: frontend
    env:
      variables:
        AMPLIFY_MONOREPO_APP_ROOT: frontend
    frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - npm install
        build:
          commands:
            - npm run build:frontend
      artifacts:
        baseDirectory: frontend/.next
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
          - frontend/.next/cache/**/*
